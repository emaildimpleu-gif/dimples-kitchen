    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}

    button{font-family:'Montserrat',system-ui,sans-serif;cursor:pointer}
    input,select,textarea{font-family:'Montserrat',system-ui,sans-serif}
    .hidden{display:none!important}
    #app{min-height:100vh;background:#F0EBE6}

    #header-title{color:#2E3038;font-size:15px;font-weight:800;letter-spacing:4px;text-transform:uppercase;font-family:'Montserrat',system-ui,sans-serif}

    #app-nav{background:#F0EBE6;border-bottom:1px solid #E0D8D0;display:flex;padding:0 28px;z-index:99;position:sticky;top:65px}
    .nav-btn{flex:none;padding:12px 20px 11px;border:none;border-bottom:2.5px solid transparent;background:none;display:flex;align-items:center;gap:0;color:#888;font-family:'Montserrat',system-ui,sans-serif;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;margin-bottom:-1px}
    .nav-btn.active{color:#2E3038;border-bottom-color:#5AAAC8}
    .nav-btn .nav-icon{display:none}
    .nav-btn .nav-label{font-size:10px;font-weight:700;letter-spacing:1.2px}
    /* Modal overlay */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:400;display:flex;align-items:flex-end;justify-content:center}
    .modal-overlay.center{align-items:center;padding:16px}
    .modal-sheet{background:#FFF;border-radius:16px 16px 0 0;width:100%;max-width:100%;max-height:96vh;overflow:hidden;display:flex;flex-direction:column}
    .modal-sheet.centered{border-radius:16px;max-width:620px;max-height:94vh}
    /* Inputs */
    .inp{width:100%;padding:9px 12px;border:1px solid #D8D0C8;border-radius:4px;font-family:'Montserrat',system-ui,sans-serif;font-size:13px;color:#2E3038;outline:none;background:#fff;box-sizing:border-box}
    .inp:focus{border-color:#5AAAC8}
    .lbl{display:block;font-size:10px;font-weight:700;color:#6A6470;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.8px}
    /* Utility */
    .sec-scroll{overflow-y:auto;flex:1}
    .nutr-chip{display:inline-block;border-radius:3px;padding:2px 6px;font-size:11px;font-weight:700;margin-right:4px}
  </style>
</head>

function handleImageSelect(e,context){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    const imgData=reader.result;
    if(context==="draft"){
      S_recipeDraft.image=imgData;
      // update preview directly in stable add-modal-root — no re-mount
      const preview=document.getElementById("recipe-img-preview-path");
      if(preview){preview.src=imgData;preview.style.display="block";}
      const hint=document.getElementById("recipe-img-hint");
      if(hint)hint.textContent="Image ready ✓";
    }else{
      const id=context.replace("recipe:","");
      const idx=S.userRecipes.findIndex(r=>r.id===id);
      if(idx!==-1){
        S.userRecipes[idx]={...S.userRecipes[idx],image:imgData};
        save("ur3",S.userRecipes);
      }
      render();
    }
  };
  reader.readAsDataURL(file);
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function antiInflam(r){
  const t=[...r.ingredients,r.title].join(" ").toLowerCase();
  // Strong anti-inflammatory ingredients qualify alone
  const strong=["turmeric","ginger","kale","spinach","flax","chia","walnut","lentil","chickpea","avocado"];
  // Mild ones need at least 2 to count
  const mild=["garlic","blueberr","broccoli","sweet potato","cinnamon","garam masala"];
  const strongHits=strong.filter(i=>t.includes(i));
  const mildHits=mild.filter(i=>t.includes(i));
  // Qualifies if: any strong ingredient, OR 2+ mild ingredients
  if(strongHits.length>0||mildHits.length>=2)return[...strongHits,...mildHits].slice(0,3);
  return[];
}

// Returns {benefits:[{label,icon}], cautions:[{label,icon}]} based on the user's active goals
function recipeInsights(r,goals){
  if(!goals||!goals.length)return{benefits:[],cautions:[]};
  const n=r.nutrition;
  const ai=antiInflam(r);
  const isAntiInflam=ai.length>=2; // at least 2 anti-inflammatory ingredients
  const highProtein=n.protein>=20;
  const vHighProtein=n.protein>=25;
  const lowCalorie=n.calories<=400;
  const highFibre=n.fiber>=8;
  const highCarb=n.carbs>=55;
  const vHighCarb=n.carbs>=75;
  const highSodium=n.sodium>=900;
  const lowProtein=n.protein<15;

  const benefits=[];
  const cautions=[];

  goals.forEach(goal=>{
    if(goal==="lose_weight"){
      if(highProtein)benefits.push({icon:"💪",label:"High protein"});
      if(highFibre)benefits.push({icon:"🌾",label:"High fibre"});
      if(lowCalorie)benefits.push({icon:"✅",label:"Low calorie"});
      if(highCarb)cautions.push({icon:"⚠",label:"High carb"});
    }
    if(goal==="blood_sugar"){
      if(highFibre)benefits.push({icon:"🌾",label:"Blood sugar friendly"});
      if(isAntiInflam)benefits.push({icon:"🌿",label:"Anti-inflammatory"});
      if(highCarb)cautions.push({icon:"⚠",label:"High carb"});
      if(highSodium)cautions.push({icon:"⚠",label:"High sodium"});
    }
    if(goal==="inflammation"){
      if(isAntiInflam)benefits.push({icon:"🌿",label:"Anti-inflammatory"});
      if(highFibre)benefits.push({icon:"🌾",label:"High fibre"});
      if(highSodium)cautions.push({icon:"⚠",label:"High sodium"});
      if(vHighCarb)cautions.push({icon:"⚠",label:"High carb"});
    }
    if(goal==="hair_skin"){
      if(highProtein)benefits.push({icon:"✨",label:"Supports hair & skin"});
      if(isAntiInflam)benefits.push({icon:"🌿",label:"Anti-inflammatory"});
    }
    if(goal==="energy"){
      if(highFibre)benefits.push({icon:"⚡",label:"Sustained energy"});
      if(highCarb)benefits.push({icon:"⚡",label:"Energy boost"});
    }
    if(goal==="maintain"){
      if(highProtein)benefits.push({icon:"💪",label:"Good protein"});
    }
  });

  // Age/menopause-aware: if profile indicates high protein need, flag low protein recipes
  const profile=S.profile||{};
  const age=parseFloat(profile.age)||0;
  const isPostMeno=profile.gender==="female"&&profile.menopause==="post";
  const isPerMeno=profile.gender==="female"&&profile.menopause==="peri";
  if((age>=50||isPostMeno||isPerMeno)&&lowProtein){
    cautions.push({icon:"⚠",label:"Low protein"});
  }
  if((isPostMeno||age>=50)&&vHighProtein){
    benefits.push({icon:"💪",label:"Great protein (50+)"});
  }

  // Deduplicate by label
  const seen=new Set();
  const uniqB=benefits.filter(x=>{if(seen.has(x.label))return false;seen.add(x.label);return true;});
  const seen2=new Set();
  const uniqC=cautions.filter(x=>{if(seen2.has(x.label))return false;seen2.add(x.label);return true;});

  return{benefits:uniqB,cautions:uniqC};
}

// Renders benefit + caution badge strips for a recipe
function renderInsightBadges(r,compact=false){
  const goals=(S.profile&&S.profile.goals)||[];
  const{benefits,cautions}=recipeInsights(r,goals);
  if(!benefits.length&&!cautions.length)return"";
  const pad=compact?"1px 6px":"2px 8px";
  const fs=compact?"10px":"11px";
  let html=`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:5px">`;
  benefits.forEach(b=>{
    html+=`<span style="background:#ECFDF5;border:1px solid #6EE7B7;color:#065F46;border-radius:10px;padding:${pad};font-size:${fs};font-weight:600">${b.icon} ${esc(b.label)}</span>`;
  });
  cautions.forEach(c=>{
    html+=`<span style="background:#FFFBEB;border:1px solid #FCD34D;color:#92400E;border-radius:10px;padding:${pad};font-size:${fs};font-weight:600">${c.icon} ${esc(c.label)}</span>`;
  });
  html+=`</div>`;
  return html;
}

// Calculate how much to scale a recipe based on calorie target
// meal = "breakfast"|"lunch"|"dinner", recipeCal = recipe's base calories
function getScaleFactor(meal,recipeCal){
  const settings=S.settings||DEFAULT_SETTINGS;
  const target=settings.calories||1700;
  // Target calories per meal type
  const mealPct={breakfast:0.30,lunch:0.30,dinner:0.40};
  const mealTarget=Math.round(target*(mealPct[meal]||0.33));
  if(!recipeCal||recipeCal<=0)return 1;
  const raw=mealTarget/recipeCal;
  // Cap between 0.5x and 2x to keep portions practical
  return Math.round(Math.max(0.5,Math.min(3,raw))*4)/4; // round to nearest 0.25 — cap at 3x
}

// ── DYNAMIC SCALE: remaining-calorie allocation ──────────────────────────────
// Computes scale for a single meal slot based on what's already assigned that day.
// daySlots  = the full day object {breakfast, lunch, dinner} (slots already assigned)
// mealKey   = the slot we are about to fill ("breakfast"|"lunch"|"dinner")
// recipeCal = recipe.nutrition.calories (base, 1 serving)
// recipes   = full recipe list (to resolve already-assigned calories)
// target    = daily calorie target
function calcDynamicScale(daySlots,mealKey,recipeCal,recipes,target){
  const MEALS=["breakfast","lunch","dinner"];
  let assignedCal=0,assignedCount=0;
  MEALS.forEach(m=>{
    if(m===mealKey)return;
    const slot=daySlots[m];
    if(!slot?.id)return;
    const r=recipes.find(x=>x.id===slot.id);
    if(!r)return;
    assignedCal+=r.nutrition.calories*(slot.scale||1);
    assignedCount++;
  });
  const remaining=target-assignedCal;
  const remainingMeals=MEALS.length-assignedCount; // includes this slot
  const mealTarget=remaining/remainingMeals;
  if(!recipeCal||recipeCal<=0)return 1;
  return Math.max(0.25,mealTarget/recipeCal);
}

function scaleIng(text,factor){
  if(factor===1)return text;
  const fracs={"⅛":0.125,"¼":0.25,"⅓":0.333,"½":0.5,"⅔":0.667,"¾":0.75};
  const fracStr={0.125:"⅛",0.25:"¼",0.333:"⅓",0.5:"½",0.667:"⅔",0.75:"¾"};
  return text.replace(/([\d⅛¼⅓½⅔¾]+\.?\d*)\s*(cup|tbsp|tsp|oz|lb|g|cups)?/gi,(match,num,unit)=>{
    let val=parseFloat(num);
    if(isNaN(val)){for(const[f,v]of Object.entries(fracs)){if(num===f){val=v;break;}}}
    if(isNaN(val))return match;
    const scaled=val*factor;
    const whole=Math.floor(scaled);
    const dec=Math.round((scaled%1)*8)/8;
    const f2=fracStr[dec]||"";
    const display=whole>0&&f2?`${whole} ${f2}`:f2||(whole===0?"":whole);
    if(display===""||display===0)return match; // too small to scale - keep original
    return`${display}${unit?" "+unit:(display!==""?" ":"")}`;
  });
}

// ── LOGIC ────────────────────────────────────────────────────────────────────
function parseIngredient(text){
  // Parse "2 cups kale" -> {qty:2, unit:"cups", name:"kale", raw:text}
  const fracs={"⅛":0.125,"¼":0.25,"⅓":0.333,"½":0.5,"⅔":0.667,"¾":0.75,"⅕":0.2,"⅔":0.667};
  const units=["cups","cup","tbsp","tsp","oz","lb","lbs","g","kg","ml","l","cloves","clove","bunch","bunches","head","heads","cans","can","pkg","package","slices","slice","pieces","piece","stalks","stalk","sizes","size"];
  let s=text.trim();
  let qty=0;
  // Match leading number/fraction combos: "1½", "1 ½", "2", "¾"
  const numRe=/^([\d]+)\s*([⅛¼⅓½⅔¾⅕])?|^([⅛¼⅓½⅔¾⅕])/;
  const m=s.match(numRe);
  if(m){
    const whole=parseFloat(m[1]||0);
    const frac=fracs[m[2]||m[3]]||0;
    qty=whole+frac;
    s=s.slice(m[0].length).trim();
  }
  // Match unit
  let unit="";
  for(const u of units){
    const re=new RegExp("^"+u+"\\b","i");
    if(re.test(s)){unit=u.toLowerCase();s=s.replace(re,"").trim();break;}
  }
  // Remove leading dashes, hyphens
  s=s.replace(/^[-–]\s*/,"").trim();
  // Normalise unit to canonical
  const unitMap={cup:"cups",tbsp:"tbsp",tsp:"tsp",oz:"oz",lb:"lb",lbs:"lb",g:"g",kg:"kg",clove:"cloves",cloves:"cloves",bunch:"bunch",bunches:"bunch",head:"head",heads:"head",can:"cans",cans:"cans",pkg:"pkg",package:"pkg",slice:"slices",slices:"slices",piece:"pieces",pieces:"pieces",stalk:"stalks",stalks:"stalks",size:"",sizes:""};
  const normUnit=unitMap[unit]!==undefined?unitMap[unit]:unit;
  // Normalise ingredient name: lowercase, remove trailing size info
  const name=s.replace(/\s*-\s*\d+["'']\s*(sizes?)?$/i,"").toLowerCase().trim();
  return{qty,unit:normUnit,name,raw:text};
}

function combineIngredients(items){
  // Group by normalised ingredient name, combine quantities where units match
  const byName={};
  items.forEach(({ing,from})=>{
    const p=parseIngredient(ing);
    // Key: ingredient name (normalised)
    const key=p.name.replace(/\s+/g," ").trim();
    if(!byName[key]){
      byName[key]={name:p.name,entries:[],froms:new Set(),raw:ing};
    }
    byName[key].entries.push({qty:p.qty,unit:p.unit,raw:ing});
    byName[key].froms.add(from);
  });
  const result=[];
  Object.values(byName).forEach(({name,entries,froms,raw})=>{
    // Group entries by unit
    const byUnit={};
    entries.forEach(e=>{
      const k=e.unit||"";
      if(!byUnit[k])byUnit[k]=0;
      byUnit[k]+=e.qty;
    });
    // Build combined text
    const parts=Object.entries(byUnit).map(([unit,qty])=>{
      if(qty===0)return"";
      // Round to nearest 1/4 for clean display, with common fraction symbols
      const whole=Math.floor(qty);
      const rem=qty-whole;
      const quarter=Math.round(rem*4)/4;
      const adjWhole=quarter>=1?whole+1:whole;
      const adjRem=quarter>=1?0:quarter;
      const fracMap={0:"",0.25:"¼",0.5:"½",0.75:"¾"};
      const fracStr=fracMap[adjRem]!==undefined?fracMap[adjRem]:(adjRem>0?"⅓":""  );
      const qtyStr=adjWhole>0&&fracStr?`${adjWhole} ${fracStr}`:fracStr||String(adjWhole);
      return unit?`${qtyStr} ${unit}`:qtyStr;
    }).filter(Boolean);
    // Show combined quantity + name
    const combinedQty=parts.join(" + ");
    const fromList=[...froms].join(", ");
    const hasMult=froms.size>1;
    result.push({
      text: combinedQty ? `${combinedQty} ${name}` : raw,
      from: fromList,
      combined: hasMult,
      count: entries.length
    });
  });
  return result;
}

// ── SINGLE SOURCE OF TRUTH: TOTAL SERVINGS ───────────────────────────────────
// selectedServings: what user chose to cook (slot.servings)
// recipeBaseServings: the recipe's own yield (r.servings) — denominator for scaling
// factor = (selectedServings + guests) / recipeBaseServings
function getSlotServingModel(dayIdx,meal){
  const slot=S.plan?.[dayIdx]?.[meal];
  if(!slot)return null;
  const r=allRecipes().find(x=>x.id===slot.id);
  const recipeBaseServings=(r&&r.servings)||1;
  const isBreakfast=meal==="breakfast";
  // Breakfast: default to 1 unless user explicitly set slot.servings
  // Lunch/dinner: fall back to getSv (backward compat) then recipe base
  const selectedServings=slot.servings||(isBreakfast?1:getSv(dayIdx,meal)||recipeBaseServings);
  const guests=slot.guests||0;
  const totalServings=selectedServings+guests;
  const ingredientFactor=totalServings/recipeBaseServings;
  const nutritionScale=slot.scale||1;
  const servingText=guests>0
    ?`${selectedServings} + ${guests} guests`
    :`${selectedServings} serving${selectedServings!==1?"s":""}`;
  return{recipeBaseServings,selectedServings,guests,totalServings,ingredientFactor,nutritionScale,servingText};
}
function getTotalServings(recipeId, selectedServings){
  const r=allRecipes().find(x=>x.id===recipeId);
  if(!r)return{totalServings:1,factor:1,baseServings:1,selectedServings:1,guestCount:0};
  const baseServings=r.servings||1;
  const sv=selectedServings!=null?selectedServings:baseServings;
  const guestCount=(S.guestServings||{})[recipeId]||0;
  const totalServings=sv+guestCount;
  const factor=totalServings/baseServings;
  return{totalServings,factor,baseServings,selectedServings:sv,guestCount};
}

function buildShoppingList(plan,recipes,days){
  // Collect unique recipe IDs and first-slot selected servings
  const seenSv={};
  for(let i=0;i<days;i++){
    ["breakfast","lunch","dinner"].forEach(meal=>{
      const id=plan[i]?.[meal]?.id;
      if(id&&seenSv[id]==null)seenSv[id]=getSv(i,meal);
    });
  }
  const allItems=[];
  Object.entries(seenSv).forEach(([id,sv])=>{
    const recipe=recipes.find(r=>r.id===id);
    if(!recipe)return;
    const{factor}=getTotalServings(id,sv);
    recipe.ingredients.forEach(ing=>{
      const scaledIng=factor!==1?scaleIng(ing,factor):ing;
      allItems.push({ing:scaledIng,from:recipe.title,originalIng:ing});
    });
  });
  const combined=combineIngredients(allItems);
  const groups={};
  combined.forEach(item=>{
    const cat=catIng(item.text);
    if(!groups[cat])groups[cat]=[];
    groups[cat].push(item);
  });
  return groups;
}
function autoFill(plan,recipes,settings,days){
  const np=plan.map(d=>({...d}));
  const bs=recipes.filter(r=>r.type==="breakfast");
  const mains=recipes.filter(r=>r.type==="dinner"||r.type==="batch");
  const target=settings.calories||1700;

  // IDs already committed as a fresh cook
  const cooked=new Set();
  for(let d=0;d<days;d++){
    ["breakfast","lunch","dinner"].forEach(m=>{if(np[d][m])cooked.add(np[d][m].id);});
  }

  function wouldDupe(d,m,id){
    return["breakfast","lunch","dinner"].some(o=>o!==m&&np[d][o]?.id===id);
  }

  function pickBest(pool,targetCal,targetProt,protSoFar){
    if(!pool.length)return null;
    let best=null,bestScore=Infinity;
    pool.forEach(r=>{
      let s=Math.abs(r.nutrition.calories-targetCal)*0.8;
      const gap=targetProt-protSoFar;
      if(gap>0)s-=Math.min(r.nutrition.protein,gap)*3;
      if(cooked.has(r.id))s+=900;
      s+=Math.random()*40;
      if(s<bestScore){bestScore=s;best=r;}
    });
    return best;
  }

  // ── BREAKFASTS ──────────────────────────────────────────────────────────────
  let bi=0;
  while(bi<days){
    if(!np[bi].breakfast){
      // Estimate target as remaining÷remaining-meals for this day
      const estTarget=calcDynamicScale(np[bi],"breakfast",target/3,recipes,target)*( target/3);
      const r=pickBest(bs,estTarget,settings.protein*0.25,0);
      if(r&&!wouldDupe(bi,"breakfast",r.id)){
        np[bi].breakfast={id:r.id,scale:calcDynamicScale(np[bi],"breakfast",r.nutrition.calories,recipes,target)};
        cooked.add(r.id);
        // Carry same breakfast to next day (saves cooking twice)
        if(bi+1<days&&!np[bi+1].breakfast&&!wouldDupe(bi+1,"breakfast",r.id)){
          np[bi+1].breakfast={id:r.id,scale:calcDynamicScale(np[bi+1],"breakfast",r.nutrition.calories,recipes,target)};
          bi+=2; continue;
        }
      }
    }
    bi++;
  }

  // ── MAINS: batch-of-2 with alternating meal type ──────────────────────────
  const opp={dinner:"lunch",lunch:"dinner"};
  function fillBatch(startMeal){
    for(let d=0;d<days;d++){
      if(np[d][startMeal])continue;
      const protSoFar=(np[d].breakfast?recipes.find(r=>r.id===np[d].breakfast?.id)?.nutrition.protein||0:0);
      // Use dynamic target based on what's already on this day
      const dynTarget=calcDynamicScale(np[d],startMeal,target/3,recipes,target)*(target/3);
      const r=pickBest(mains,dynTarget,settings.protein*(startMeal==="dinner"?0.45:0.3),protSoFar);
      if(!r||wouldDupe(d,startMeal,r.id))continue;
      np[d]={...np[d],[startMeal]:{id:r.id,scale:calcDynamicScale(np[d],startMeal,r.nutrition.calories,recipes,target),servings:2}};cooked.add(r.id);
      const oppMeal=opp[startMeal];
      let filled2=false;
      for(let d2=d+1;d2<days;d2++){if(!np[d2][oppMeal]&&!wouldDupe(d2,oppMeal,r.id)){np[d2]={...np[d2],[oppMeal]:{id:r.id,scale:calcDynamicScale(np[d2],oppMeal,r.nutrition.calories,recipes,target),servings:2}};filled2=true;break;}}
      if(!filled2){for(let d2=d-1;d2>=0;d2--){if(!np[d2][oppMeal]&&!wouldDupe(d2,oppMeal,r.id)){np[d2]={...np[d2],[oppMeal]:{id:r.id,scale:calcDynamicScale(np[d2],oppMeal,r.nutrition.calories,recipes,target),servings:2}};break;}}}
    }
  }
  fillBatch("dinner");
  fillBatch("lunch");

  return np;
}

function dayNutr(day,recipes,dayIdx){
  const meals=["breakfast","lunch","dinner"].map(m=>{
    if(!day?.[m])return null;
    const slot=day[m];
    const r=recipes.find(x=>x.id===slot.id);
    if(!r)return null;
    const f=slot.scale||1;
    return{calories:Math.round(r.nutrition.calories*f),protein:Math.round(r.nutrition.protein*f),carbs:Math.round(r.nutrition.carbs*f),fat:Math.round(r.nutrition.fat*f),fiber:Math.round((r.nutrition.fiber||0)*f)};
  });
  const mealTotals={calories:meals.reduce((s,r)=>s+(r?.calories||0),0),protein:meals.reduce((s,r)=>s+(r?.protein||0),0),carbs:meals.reduce((s,r)=>s+(r?.carbs||0),0),fat:meals.reduce((s,r)=>s+(r?.fat||0),0),fiber:meals.reduce((s,r)=>s+(r?.fiber||0),0)};
  // Extras: strictly additive, never touch meal calculations
  const extras=(dayIdx!==undefined&&S.extras&&S.extras[dayIdx])||[];
  const extraTotals=extras.reduce((acc,e)=>({calories:acc.calories+(e.calories||0),protein:acc.protein+(e.protein||0),carbs:acc.carbs+(e.carbs||0),fat:acc.fat+(e.fat||0),fiber:acc.fiber+(e.fiber||0)}),{calories:0,protein:0,carbs:0,fat:0,fiber:0});
  return{calories:mealTotals.calories+extraTotals.calories,protein:mealTotals.protein+extraTotals.protein,carbs:mealTotals.carbs+extraTotals.carbs,fat:mealTotals.fat+extraTotals.fat,fiber:mealTotals.fiber+extraTotals.fiber};
}
const ACTIVITY_MULTIPLIERS={sedentary:1.2,light:1.375,moderate:1.55,active:1.725};
const ACTIVITY_LABELS={sedentary:"Sedentary (desk job, little exercise)",light:"Lightly Active (1–3x exercise/week)",moderate:"Moderately Active (3–5x exercise/week)",active:"Very Active (daily intense exercise)"};
const GOAL_LABELS={lose_weight:"🎯 Lose Weight",maintain:"⚖️ Maintain Weight",inflammation:"🌿 Reduce Inflammation",blood_sugar:"🩸 Manage Blood Sugar",hair_skin:"✨ Hair & Skin Health",energy:"⚡ More Energy"};
function calcNutrition(profile){
  const{gender,age,weight,height,menopause,activity,goals}=profile;
  if(!weight||!age||!height)return null;
  const w=parseFloat(weight),h=parseFloat(height),a=parseFloat(age);
  const bmr=gender==="male"?(10*w)+(6.25*h)-(5*a)+5:(10*w)+(6.25*h)-(5*a)-161;
  const mult=ACTIVITY_MULTIPLIERS[activity]||1.375;
  let calories=Math.round(bmr*mult);
  if((goals||[]).includes("lose_weight"))calories=Math.round(calories*0.85);
  // Protein: base 1.0g/kg uplifted by age, menopause, activity and goals
  let proteinPerKg=1.0;
  if(a>=50)proteinPerKg+=0.2;
  if(menopause==="post")proteinPerKg+=0.2;
  else if(menopause==="peri")proteinPerKg+=0.1;
  if(activity==="moderate")proteinPerKg+=0.1;
  if(activity==="active")proteinPerKg+=0.2;
  if((goals||[]).includes("hair_skin"))proteinPerKg=Math.max(proteinPerKg,1.5);
  if((goals||[]).includes("lose_weight"))proteinPerKg=Math.max(proteinPerKg,1.4);
  if((goals||[]).includes("inflammation"))proteinPerKg=Math.max(proteinPerKg,1.3);
  const protein=Math.round(w*proteinPerKg);
  const fatPct=(goals||[]).includes("blood_sugar")?0.35:a>=50?0.32:0.30;
  const fat=Math.round((calories*fatPct)/9);
  const carbs=Math.max(80,Math.round((calories-(protein*4)-(fat*9))/4));
  const fiber=gender==="male"?(a>=51?30:38):(a>=51?21:25);
  return{calories,protein,carbs,fat,fiber};
}
function buildWizardPlan(w,days){
  const plan=Array(days).fill(null).map(()=>({breakfast:null,lunch:null,dinner:null}));
  const{breakfastIds,dinnerIds,dinnerServings}=w;
  const target=(S.settings||DEFAULT_SETTINGS).calories||1700;
  const _all=allRecipes();
  // Assign breakfasts first so mains can account for them when computing scale
  if(breakfastIds.length>0){
    for(let i=0;i<days;i++){
      const _id=breakfastIds[i%breakfastIds.length];
      const _r=_all.find(x=>x.id===_id);
      plan[i].breakfast={id:_id,scale:_r?calcDynamicScale(plan[i],"breakfast",_r.nutrition.calories,_all,target):1};
    }
  }
  // Fill mains - alternate dinner/lunch (Mon dinner -> Tue lunch -> Wed dinner)
  dinnerIds.forEach(id=>{
    const sv=dinnerServings[id]||2;
    let placed=0;
    const oppM={dinner:"lunch",lunch:"dinner"};
    let meal="dinner";
    const _r=_all.find(x=>x.id===id);
    for(let d=0;d<days&&placed<sv;d++){
      if(!plan[d][meal]&&plan[d].breakfast?.id!==id&&!Object.values(plan[d]).some(s=>s?.id===id)){
        plan[d][meal]={id,scale:_r?calcDynamicScale(plan[d],meal,_r.nutrition.calories,_all,target):1};placed++;meal=oppM[meal];
      }
    }
  });
  return plan;
}
function recalibrate(plan,recipes,settings,days){
  const np=plan.map(d=>({...d}));
  const target=settings.calories;
  function scaledMealCal(slot){if(!slot?.id)return 0;const r=recipes.find(x=>x.id===slot.id);if(!r)return 0;return r.nutrition.calories*(slot.scale||1);}
  function dayCal(d){return["breakfast","lunch","dinner"].reduce((s,m)=>s+scaledMealCal(np[d][m]),0);}
  function hasDupe(d){const ids=["breakfast","lunch","dinner"].map(m=>np[d][m]?.id).filter(Boolean);return ids.length!==new Set(ids).size;}
  let improved=true,passes=0;
  while(improved&&passes<30){
    improved=false;passes++;
    for(let i=0;i<days;i++){for(let j=i+1;j<days;j++){for(const m of["breakfast","lunch","dinner"]){
      if(!!np[i][m]!==!!np[j][m])continue;
      const before=Math.abs(dayCal(i)-target)+Math.abs(dayCal(j)-target);
      const tmp=np[i][m];np[i][m]=np[j][m];np[j][m]=tmp;
      const after=Math.abs(dayCal(i)-target)+Math.abs(dayCal(j)-target);
      if(after<before-10&&!hasDupe(i)&&!hasDupe(j)){improved=true;}
      else{const t2=np[i][m];np[i][m]=np[j][m];np[j][m]=t2;}
    }}}
  }
  return np;
}

    const chk=chkS[idx];
    html+=`<div onclick="S.recipeModal.chkS[${idx}]=!S.recipeModal.chkS[${idx}];renderModals()" style="display:flex;gap:12px;margin-bottom:14px;cursor:pointer;opacity:${chk?0.4:1}">`;
    html+=`<div style="width:26px;height:26px;border-radius:50%;flex-shrink:0;background:${chk?G:"#F0F7F0"};border:2px solid ${chk?G:"#A8C5A0"};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:${chk?"#FFF":G}">${chk?"✓":idx+1}</div>`;
    html+=`<p style="margin:0;font-size:14px;color:#2E3038;line-height:1.65;flex:1;text-decoration:${chk?"line-through":"none"}">${esc(step)}</p>`;
    html+=`</div>`;
  });
  html+=`</div></div></div>`;
  return html;
}

// ── PLAN ───────────────────────────────────────────────────────────────────────
function renderPlan(){
  const all=allRecipes();
  const{showWizard,wizard}=S.planState;
  const DAY=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
  let stats={calories:0,protein:0,carbs:0,fat:0,fiber:0,filled:0,total:S.days*3};
  for(let i=0;i<S.days;i++){
    const n=dayNutr(S.plan[i],all,i);
    stats.calories+=n.calories;stats.protein+=n.protein;stats.carbs+=n.carbs;stats.fat+=n.fat;stats.fiber+=n.fiber;
    ["breakfast","lunch","dinner"].forEach(m=>{if(S.plan[i]?.[m]?.id)stats.filled++;});
  }
  const mainSlots=S.days*2;
  const totalDinnerServings=wizard.dinnerIds.reduce((s,id)=>s+(wizard.dinnerServings[id]||2),0);
  const mainSlotsLeft=Math.max(0,mainSlots-totalDinnerServings);
  const wizardComplete=wizard.breakfastIds.length>0&&wizard.dinnerIds.length>0;

  let html=`<div>`;

  // ── TOOLBAR ──
  html+=`<div style="background:#EDE8E2;padding:14px 28px;border-bottom:1px solid #E0D8D0;display:flex;align-items:center;gap:28px">`;
  // Auto-fill
  html+=`<button onclick="backupPlan();S.plan=autoFill(S.plan,allRecipes(),S.settings,S.days);persistPlan();render()" style="display:flex;flex-direction:column;align-items:center;gap:5px;border:none;background:none;padding:0;cursor:pointer;outline:none">`;
  html+=`<div style="width:42px;height:42px;border-radius:50%;background:#5AAAC8;display:flex;align-items:center;justify-content:center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L9 9H2l5.5 4-2 7L12 16l6.5 4-2-7L22 9h-7z"/></svg></div>`;
  html+=`<span style="font-size:8px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:#5AAAC8">Auto-fill</span></button>`;
  // Recalibrate
  html+=`<button onclick="backupPlan();S.plan=recalibrate(S.plan,allRecipes(),S.settings,S.days);persistPlan();render()" style="display:flex;flex-direction:column;align-items:center;gap:5px;border:none;background:none;padding:0;cursor:pointer;outline:none">`;
  html+=`<div style="width:42px;height:42px;border-radius:50%;background:#F0A500;display:flex;align-items:center;justify-content:center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3M12 18v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M3 12h3M18 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg></div>`;
  html+=`<span style="font-size:8px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:#F0A500">Recalibrate</span></button>`;
  // Wizard
  html+=`<button onclick="S.planState.showWizard=!S.planState.showWizard;render()" style="display:flex;flex-direction:column;align-items:center;gap:5px;border:none;background:none;padding:0;cursor:pointer;outline:none">`;
  html+=`<div style="width:42px;height:42px;border-radius:50%;background:#C8A0D8;display:flex;align-items:center;justify-content:center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>`;
  html+=`<span style="font-size:8px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:#C8A0D8">Wizard</span></button>`;
  // Clear
  html+=`<button onclick="backupPlan();S.plan=Array(7).fill(null).map(()=>({breakfast:null,lunch:null,dinner:null}));S.extras={};S.checked={};save('extras3',S.extras);persistPlan();render()" style="display:flex;flex-direction:column;align-items:center;gap:5px;border:none;background:none;padding:0;cursor:pointer;outline:none">`;
  html+=`<div style="width:42px;height:42px;border-radius:50%;background:#E8E0DC;display:flex;align-items:center;justify-content:center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#B0A8B0" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>`;
  html+=`<span style="font-size:8px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-tertiary)">Clear</span></button>`;
  // PDF
  html+=`<button onclick="exportWeeklyPDF()" style="display:flex;flex-direction:column;align-items:center;gap:5px;border:none;background:none;padding:0;cursor:pointer;outline:none;margin-left:auto">`;
  html+=`<div style="width:42px;height:42px;border-radius:50%;background:#E8E0DC;display:flex;align-items:center;justify-content:center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9A9098" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>`;
  html+=`<span style="font-size:8px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-secondary)">PDF</span></button>`;
  html+=`</div>`;

  // ── WIZARD ──
  if(showWizard){
    html+=`<div style="background:#F0EBE6;padding:24px 28px">`;
    html+=`<div style="display:flex;justify-content:flex-end;margin-bottom:14px"><button onclick="S.planState.wizard={breakfastIds:[],dinnerIds:[],dinnerServings:{}};render()" style="font-size:11px;font-weight:700;color:var(--text-secondary);border:1.5px solid #D8D0C8;background:#fff;padding:6px 14px;border-radius:4px;cursor:pointer;font-family:'Montserrat',sans-serif;outline:none">x Clear wizard</button></div>`;
    html+=`<div style="display:grid;grid-template-columns:1fr 1fr 2fr;gap:20px">`;
    // Step 1
    html+=`<div style="background:#fff;border:1px solid #E8E0D8;border-radius:8px;padding:18px">`;
    html+=`<div style="display:flex;align-items:center;gap:10px;padding-bottom:14px;border-bottom:1px solid #F0E8E0;margin-bottom:14px">`;
    html+=`<div style="width:30px;height:30px;border-radius:50%;background:#F0A500;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0">1</div>`;
    html+=`<div><div style="font-size:12px;font-weight:700;color:#2E3038">How many days?</div><div style="font-size:10px;color:#A8A0B0;font-weight:500;margin-top:2px">Choose your window</div></div></div>`;
    html+=`<div style="display:flex;gap:8px">`+[3,5,7].map(d=>`<button onclick="S.days=${d};render()" style="flex:1;padding:14px 0;border:2px solid ${S.days===d?TEAL:"#E8E0DC"};border-radius:6px;background:${S.days===d?"#EEF7FB":"#FAF8F5"};color:${S.days===d?TEAL:"#C8C0C8"};font-size:16px;font-weight:800;cursor:pointer;font-family:'Montserrat',sans-serif;outline:none">${d}</button>`).join("")+`</div>`;
    html+=`</div>`;
    // Step 2
    html+=`<div style="background:#fff;border:1px solid #E8E0D8;border-radius:8px;padding:18px">`;
    html+=`<div style="display:flex;align-items:center;gap:10px;padding-bottom:14px;border-bottom:1px solid #F0E8E0;margin-bottom:14px">`;
    html+=`<div style="width:30px;height:30px;border-radius:50%;background:#F0A500;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0">2</div>`;
    html+=`<div><div style="font-size:12px;font-weight:700;color:#2E3038">Pick 1–2 breakfasts</div><div style="font-size:10px;color:#A8A0B0;font-weight:500;margin-top:2px">They rotate across your week</div></div></div>`;
    wizard.breakfastIds.forEach(id=>{
      const r=all.find(x=>x.id===id);if(!r)return;
      const img=IMG_MAP[id];
      html+=`<div style="display:flex;align-items:center;border:1px solid #E8E0D8;border-radius:5px;overflow:hidden;background:#fff;margin-bottom:6px">`;
      html+=img?`<img src="${img}" style="width:48px;height:48px;object-fit:cover;flex-shrink:0">`:`<div style="width:48px;height:48px;background:#FFF8EE;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${r.emoji}</div>`;
      html+=`<div style="flex:1;padding:6px 10px"><div style="font-size:10px;font-weight:600;color:#2E3038;line-height:1.3">${esc(r.title)}</div><div style="font-size:9px;color:#F0A500;font-weight:700;margin-top:2px">${r.nutrition.calories} cal</div></div>`;
      html+=`<button onclick="S.planState.wizard.breakfastIds=S.planState.wizard.breakfastIds.filter(x=>x!=='${id}');render()" style="border:none;background:none;color:#C8C0CC;font-size:14px;cursor:pointer;padding:0 10px;flex-shrink:0;outline:none">×</button>`;
      html+=`</div>`;
    });
    if(wizard.breakfastIds.length<2)html+=`<button onclick="openWizardPicker('breakfast','Pick Breakfast Options','Pick 1 or 2 — they rotate daily',2)" style="width:100%;padding:11px;border:1.5px dashed #D0C8C0;background:transparent;color:#A8A0B0;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;cursor:pointer;border-radius:5px;letter-spacing:0.5px;text-transform:uppercase;outline:none">+ Add breakfast</button>`;
    html+=`</div>`;
    // Step 3
    html+=`<div style="background:#fff;border:1px solid #E8E0D8;border-radius:8px;padding:18px">`;
    html+=`<div style="display:flex;align-items:center;gap:10px;padding-bottom:14px;border-bottom:1px solid #F0E8E0;margin-bottom:14px">`;
    html+=`<div style="width:30px;height:30px;border-radius:50%;background:#5AAAC8;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0">3</div>`;
    html+=`<div><div style="font-size:12px;font-weight:700;color:#2E3038">Plan your ${mainSlots} main meals</div><div style="font-size:10px;color:#A8A0B0;font-weight:500;margin-top:2px">${totalDinnerServings} of ${mainSlots} slots covered</div></div></div>`;
    html+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:10px">`;
    wizard.dinnerIds.forEach(id=>{
      const dSv=wizard.dinnerServings[id]||2;
      const dr=all.find(x=>x.id===id);
      const chipImg=IMG_MAP[id];
      html+=`<div style="border:1px solid #E8E0D8;border-radius:5px;overflow:hidden">`;
      html+=`<div style="display:flex;align-items:center;border-bottom:1px solid #F0E8E0">`;
      html+=chipImg?`<img src="${chipImg}" style="width:48px;height:48px;object-fit:cover;flex-shrink:0">`:`<div style="width:48px;height:48px;background:#F5F0EA;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${dr?dr.emoji:"🍽"}</div>`;
      html+=`<div style="flex:1;padding:6px 8px"><div style="font-size:10px;font-weight:600;color:#2E3038;line-height:1.3">${esc(dr?dr.title:"")}</div><div style="font-size:9px;color:#F0A500;font-weight:700;margin-top:2px">${dr?dr.nutrition.calories:""} cal</div></div>`;
      html+=`<button onclick="S.planState.wizard.dinnerIds=S.planState.wizard.dinnerIds.filter(x=>x!=='${id}');delete S.planState.wizard.dinnerServings['${id}'];render()" style="border:none;background:none;color:#C8C0CC;font-size:14px;cursor:pointer;padding:0 8px;flex-shrink:0;outline:none">×</button></div>`;
      html+=`<div style="display:flex;align-items:center;gap:4px;padding:6px 8px;flex-wrap:wrap"><span style="font-size:8px;font-weight:700;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:0.4px">Servings:</span>`;
      html+=[1,2,4,6].map(s=>`<button onclick="S.planState.wizard.dinnerServings['${id}']=${s};render()" style="font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;padding:3px 9px;border:1.5px solid ${dSv===s?AMBER:"#E0D8D0"};border-radius:4px;background:${dSv===s?"#FFF3D0":"#fff"};color:${dSv===s?"#C87800":"#A8A0B0"};cursor:pointer;outline:none">${s}</button>`).join("");
      html+=`</div></div>`;
    });
    html+=`</div>`;
    if(mainSlotsLeft>0)html+=`<button onclick="openWizardPicker('dinner','Pick a meal','Choose any meal — set servings below',1)" style="width:100%;padding:11px;border:1.5px dashed #D0C8C0;background:transparent;color:#A8A0B0;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;cursor:pointer;border-radius:5px;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:10px;outline:none">+ Add a meal</button>`;
    const buildAction=wizardComplete?`backupPlan();S.plan=buildWizardPlan(S.planState.wizard,S.days);S.servings={};S.plan=autoFill(S.plan,allRecipes(),S.settings||DEFAULT_SETTINGS,S.days);S.planState.showWizard=false;persistPlan();render()`:"";
    html+=`<button onclick="${buildAction}" style="width:100%;padding:14px;background:${wizardComplete?TEAL:"#E0D8D0"};color:${wizardComplete?"#fff":"#B0A8B0"};border:none;border-radius:6px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:800;cursor:${wizardComplete?"pointer":"default"};letter-spacing:1px;text-transform:uppercase;outline:none">`;
    html+=wizardComplete?(mainSlotsLeft>0?"Build & Autofill →":"Build My Week →"):`Add ${Math.max(0,1-wizard.breakfastIds.length)} breakfast + 1 meal to continue`;
    html+=`</button></div>`;
    html+=`</div></div>`;
  }

  // ── NUTRITION STRIP ──
  html+=`<div style="background:#fff;border-bottom:1px solid #E0D8D0;padding:12px 28px;display:flex">`;
  const nutrDefs=[
    {l:"Avg Cal",v:S.days>0?Math.round(stats.calories/S.days):0,t:S.settings.calories,u:"",c:AMBER},
    {l:"Protein",v:stats.protein,t:S.settings.protein*S.days,u:"g",c:TEAL},
    {l:"Carbs",v:stats.carbs,t:S.settings.carbs*S.days,u:"g",c:CHARCOAL},
    {l:"Fat",v:stats.fat,t:S.settings.fat*S.days,u:"g",c:PINK},
    {l:"Fiber",v:stats.fiber,t:S.settings.fiber*S.days,u:"g",c:INDIGO}
  ];
  nutrDefs.forEach((s,i)=>{
    const pct=Math.min(100,s.t>0?(s.v/s.t)*100:0);
    html+=`<div style="flex:1;text-align:center;${i<4?"border-right:1px solid #EDE5E0;":""}padding:0 8px">`;
    html+=`<div style="font-size:8px;font-weight:700;color:#B8B0B8;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px">${s.l}</div>`;
    html+=`<div style="font-size:18px;font-weight:800;color:${s.c}">${s.v}${s.u}</div>`;
    html+=`<div style="font-size:9px;color:var(--text-secondary);margin-top:2px;font-weight:500">goal ${s.t}${s.u}</div>`;
    html+=`<div style="height:3px;margin-top:6px;background:#EDE5E0;border-radius:2px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${s.c};border-radius:2px"></div></div>`;
    html+=`</div>`;
  });
  html+=`</div>`;

  // ── DAY CARDS ──
  html+=`<div style="padding:18px 28px;display:flex;flex-direction:column;gap:20px">`;
  for(let i=0;i<S.days;i++){
    const dn=dayNutr(S.plan[i],all,i);
    const calPct=Math.min(100,S.settings.calories>0?(dn.calories/S.settings.calories)*100:0);
    let barColor=INDIGO; // empty
    if(dn.calories>0){
      if(calPct>105)barColor=PINK;
      else if(calPct>=75)barColor=TEAL;
      else barColor=AMBER;
    }
    const calLabel=dn.calories>0?`${dn.calories} cal`:"— empty";
    const calColor=dn.calories>0?(calPct>105?PINK:calPct>=75?TEAL:AMBER):INDIGO;
    html+=`<div>`;
    html+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">`;
    html+=`<span style="font-size:13px;font-weight:800;color:#2E3038;letter-spacing:1px;text-transform:uppercase">${DAY[i]}</span>`;
    html+=`<span style="font-size:12px;font-weight:700;color:${calColor}">${calLabel}${calPct>=75&&calPct<=105?" ✓":""}</span>`;
    html+=`</div>`;
    html+=`<div style="height:3px;background:#E8E0D8;margin-bottom:10px;border-radius:2px;overflow:hidden"><div style="height:100%;width:${calPct}%;background:${barColor};border-radius:2px"></div></div>`;
    html+=renderDaySummary(i);
    html+=renderHydrationHint(i);
    html+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">`;
    ["breakfast","lunch","dinner"].forEach(meal=>{
      const r=S.plan[i]?.[meal]?.id?all.find(x=>x.id===S.plan[i][meal].id):null;
      const dotCol=meal==="breakfast"?AMBER:meal==="lunch"?TEAL:PINK;
      if(r){
        const slot=S.plan[i][meal];
        const slotScale=slot?.scale||1;
        const planImg=recipeImg(r);
        // Outer container: NO onclick — click zones are explicit below
        html+=`<div style="background:#fff;border:1px solid #E8E0D8;border-radius:6px;overflow:hidden" onmouseover="this.style.borderColor='#5AAAC8'" onmouseout="this.style.borderColor='#E8E0D8'">`;
        // ── SLOT BODY: dedicated click zone for opening modal ─────────────────
        html+=`<div onclick="openRecipe('${esc(r.id)}',${slotScale},${i},'${meal}','plan')" style="cursor:pointer">`;
        if(planImg){
          html+=`<div style="height:130px;position:relative;overflow:hidden">`;
          html+=`<img src="${planImg}" style="width:100%;height:100%;object-fit:cover;display:block;pointer-events:none">`;
          html+=`<div style="position:absolute;top:8px;left:8px;width:9px;height:9px;border-radius:50%;background:${dotCol};pointer-events:none"></div>`;
          let recipeCount=0;for(let pi=0;pi<S.days;pi++){["breakfast","lunch","dinner"].forEach(bm=>{if(S.plan[pi]?.[bm]?.id===r.id)recipeCount++;});}
          const guestC=S.plan[i][meal]?.guests||0;
          const batchLabel=recipeCount>1&&guestC>0?`x${recipeCount} + ${guestC} guests`:recipeCount>1?`x${recipeCount} this week`:guestC>0?`+${guestC} guests`:"";
          if(batchLabel)html+=`<div style="position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,0.55);color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;letter-spacing:0.3px;font-family:'Montserrat',sans-serif;pointer-events:none">${batchLabel}</div>`;
          html+=`</div>`;
        } else {
          const bgCol=meal==="breakfast"?"#FFF8EE":"#F5F0EA";
          html+=`<div style="height:130px;background:${bgCol};display:flex;align-items:center;justify-content:center;font-size:44px;position:relative">`;
          html+=`<span style="pointer-events:none">${r.emoji}</span>`;
          html+=`<div style="position:absolute;top:8px;left:8px;width:9px;height:9px;border-radius:50%;background:${dotCol};pointer-events:none"></div>`;
          html+=`</div>`;
        }
        html+=`<div style="padding:10px 12px 4px">`;
        html+=`<div style="font-size:8px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px">${meal==="breakfast"?"☀️ Breakfast":meal==="lunch"?"🌤 Lunch":"🌙 Dinner"}</div>`;
        const scaledCal=Math.round(r.nutrition.calories*slotScale);
        const scaledProt=Math.round(r.nutrition.protein*slotScale);
        html+=`<div style="font-size:11px;font-weight:600;color:#2E3038;line-height:1.35;margin-bottom:4px">${esc(r.title)}</div>`;
        html+=`<span style="font-size:10px;font-weight:700;color:#F0A500">${scaledCal} cal · ${scaledProt}g P</span>`;
        html+=`</div>`;
        html+=`</div>`;
        // ── ACTION BUTTONS: siblings of slot-body, no nesting conflict ────────
        html+=`<div style="display:flex;gap:4px;padding:6px 10px 8px;border-top:1px solid #F0EDE8">`;

// ── NUTRITION AUDIT ──────────────────────────────────────────────────────────
// Pure read-only. NO side effects. Does NOT modify state or meals.
// ── NUTRITION AUDIT (priority-based, range-aware) ─────────────────────────────
// READ-ONLY. No state mutations. No side effects.

function getProteinRange(calories){
  return{min:Math.round(calories*0.06),max:Math.round(calories*0.08)};
}

function auditDay(dayIdx){
  const recipes=allRecipes();
  const nutr=dayNutr(S.plan[dayIdx],recipes,dayIdx);
  const t=S.settings||DEFAULT_SETTINGS;
  const hasMeals=["breakfast","lunch","dinner"].some(m=>S.plan[dayIdx]?.[m]?.id);
  if(!hasMeals)return null;

  const target=t.calories||1700;
  const calLower=target-100;
  const calUpper=target+100;
  const calHigh=nutr.calories>calUpper;
  const calLow=target>0&&nutr.calories<calLower;
  const calOk=!calHigh&&!calLow;
  const fiberLow=nutr.fiber<20;
  const proteinHigh=nutr.protein>t.protein;
  const pRange=getProteinRange(nutr.calories);
  const proteinBelowRange=nutr.protein<pRange.min;
  const proteinAboveRange=nutr.protein>pRange.max;

  // Evaluate in strict priority order: calories → fiber → protein
  // Only the highest-priority issue is surfaced. Conflicting advice is suppressed.

  // ── PRIORITY 1: CALORIES ───────────────────────────────────────────────────
  if(calHigh){
    const delta=nutr.calories-target;
    // Rule 3: calories exceeded + protein low → calorie warning primary, protein secondary
    const proteinNote=proteinBelowRange?" Consider improving protein earlier in the week rather than adding more today.":"";
    if(delta<=100){
      return{
        nutr,
        issue:"Calories slightly above target (+"+delta+")",
        suggestions:["Remove 1 extra or reduce a portion","Optional: light walk (10–15 min)"+proteinNote],
        riskLevel:"low"
      };
    }
    if(delta<=300){
      return{
        nutr,
        issue:"Calories moderately above target (+"+delta+")",
        suggestions:["Remove 1–2 extras or reduce portion sizes","Optional: 15–25 min walk — but food changes matter more"+proteinNote],
        riskLevel:"medium"
      };
    }
    // delta > 300
    return{
      nutr,
      issue:"Calories significantly above target (+"+delta+")",
      suggestions:["Remove multiple extras AND adjust at least one meal portion","Activity helps, but cannot offset this alone — food changes are needed"+proteinNote],
      riskLevel:"high"
    };
  }
  if(calLow){
    return{
      nutr,
      issue:"Calories below target — a small snack would help",
      suggestions:["Add a balanced snack with protein and fiber"],
      riskLevel:"medium"
    };
  }

  // ── PRIORITY 2: FIBER (critical) ───────────────────────────────────────────
  // Rule 2: calories on target + fiber high → suppress warning (hydration hint is enough)
  const fiberHigh=nutr.fiber>=(t.fiber||25);
  if(calOk&&fiberHigh&&!fiberLow&&!proteinHigh){
    return{nutr,issue:null,suggestions:[],riskLevel:"low"};
  }
  if(fiberLow&&proteinHigh){
    // Constipation risk: protein high + fiber low — don't suggest more protein
    return{
      nutr,
      issue:"High protein, low fiber — constipation risk",
      suggestions:["Increase fiber before adding more protein","Add chia seeds or vegetables","Increase hydration"],
      riskLevel:"high"
    };
  }
  if(fiberLow){
    return{
      nutr,
      issue:"Fiber below minimum ("+nutr.fiber+"g) — aim for 20g+",
      suggestions:["Add 1 tbsp chia seeds via Extras","Consider swapping a meal to beans or lentils"],
      riskLevel:"medium"
    };
  }

  // ── PRIORITY 3: PROTEIN (range-aware, only if calories are ok) ─────────────
  // Suppress protein advice if calories are high (adding protein would worsen calorie overage)
  // Rule 1: calories on target + protein low → reassure rather than alarm
  if(proteinBelowRange&&calOk){
    return{
      nutr,
      issue:"Calories on target — keep this day. Protein can be improved over the week.",
      suggestions:["Add whey or low-fat yogurt via Extras (if calories allow)","→ Daily perfection not required — aim for weekly balance"],
      riskLevel:"low"
    };
  }
  if(proteinAboveRange){
    return{
      nutr,
      issue:"Protein above optimal range ("+nutr.protein+"g vs "+pRange.min+"–"+pRange.max+"g)",
      suggestions:["No action needed unless total calories are also high"],
      riskLevel:"low"
    };
  }

  // ── ALL CLEAR ──────────────────────────────────────────────────────────────
  return{nutr,issue:null,suggestions:[],riskLevel:"low"};
}

function renderAudit(dayIdx){
  const audit=auditDay(dayIdx);
  if(!audit)return"";
  // All clear — show a calm green status line
  if(!audit.issue){
    return`<div style="margin-top:8px;border-top:1px solid #EDE8E2;padding-top:6px;display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:9px;font-weight:700;color:#A09898;text-transform:uppercase;letter-spacing:1px">📊 Daily Audit</span>
      <span style="font-size:9px;font-weight:600;color:#16A34A">✓ Within healthy range</span>
    </div>`;
  }
  const badgeColor=audit.riskLevel==="high"?"#DC2626":audit.riskLevel==="medium"?"#D97706":"#16A34A";
  const badgeBg=audit.riskLevel==="high"?"#FEF2F2":audit.riskLevel==="medium"?"#FFFBEB":"#F0FDF4";
  const badgeBorder=audit.riskLevel==="high"?"#FECACA":audit.riskLevel==="medium"?"#FDE68A":"#BBF7D0";
  const badgeLabel=audit.riskLevel==="high"?"Needs attention":audit.riskLevel==="medium"?"Review":"Note";
  let html=`<div style="margin-top:8px;border-top:1px solid #EDE8E2;padding-top:8px">`;
  html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">`;
  html+=`<span style="font-size:9px;font-weight:700;color:#A09898;text-transform:uppercase;letter-spacing:1px">📊 Daily Audit</span>`;
  html+=`<span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;background:${badgeBg};color:${badgeColor};border:1px solid ${badgeBorder}">${badgeLabel}</span>`;
  html+=`</div>`;
  html+=`<div style="font-size:10px;color:#4B5563;font-weight:600;margin-bottom:4px;line-height:1.4">${esc(audit.issue)}</div>`;
  if(audit.suggestions.length){
    audit.suggestions.slice(0,2).forEach(s=>{
      html+=`<div style="font-size:10px;color:#6B7280;margin-bottom:2px;line-height:1.4;padding-left:6px;border-left:2px solid #E5E7EB">→ ${esc(s)}</div>`;
    });
  }
  html+=`</div>`;
  return html;
}


// ── SERVING APPLY (from recipe modal) ─────────────────────────────────────────
function getAvailableSlots(){
  let count=0;
  for(let d=0;d<S.days;d++){
    ["breakfast","lunch","dinner"].forEach(m=>{if(!S.plan[d]?.[m]?.id)count++;});
  }
  return count;
}
function countRecipeInPlan(recipeId){
  let count=0;
  for(let d=0;d<S.days;d++){
    ["breakfast","lunch","dinner"].forEach(m=>{if(S.plan[d]?.[m]?.id===recipeId)count++;});
  }
  return count;
}
function applyServingsFromModal(){
  const{dayIdx,meal,sv,id}=S.recipeModal;
  if(dayIdx==null||!meal)return;
  const currentCount=countRecipeInPlan(id);
  const needed=sv-currentCount;
  if(needed>0){
    const available=getAvailableSlots();
    if(needed>available){
      const missing=needed-available;
      const confirmed=confirm(
        `Only ${available} empty slot${available!==1?"s":""} available this week.\n`+
        `To reach ${sv} serving${sv!==1?"s":""}, ${missing} existing meal${missing!==1?"s":""} would be replaced.\n\n`+
        `Replace ${missing} meal${missing!==1?"s":""} from the end of the week?`
      );
      if(!confirmed)return;
      // ── BUILD SCORED CANDIDATE LIST ────────────────────────────────────────
      const recipes=allRecipes();
      const tgt=S.settings||DEFAULT_SETTINGS;
      const calTarget=tgt.calories||1700;
      const candidates=[];
      for(let d=0;d<S.days;d++){
        for(const m of["breakfast","lunch","dinner"]){
          if(d===dayIdx&&m===meal)continue; // never clear anchor
          const slot=S.plan[d]?.[m];
          if(!slot?.id||slot.id===id)continue; // skip empty and own slots
          const r=recipes.find(x=>x.id===slot.id);
          if(!r)continue;
          // Day totals before removal
          const dayTotals=dayNutr(S.plan[d],recipes,d);
          // Meal contribution at stored scale
          const mealScale=slot.scale||1;
          const mealCal=Math.round(r.nutrition.calories*mealScale);
          const mealProt=Math.round(r.nutrition.protein*mealScale);
          // Day totals after simulated removal
          const remCal=dayTotals.calories-mealCal;
          const remProt=dayTotals.protein-mealProt;
          // Score: higher = better candidate for removal
          let score=0;
          if(dayTotals.calories>calTarget+100) score+=2;  // day is over → removing helps
          if(dayTotals.protein<tgt.protein)    score+=2;  // protein low anyway
          if(dayTotals.fiber<20)               score+=1;  // fiber low anyway
          if(Math.abs(dayTotals.calories-calTarget)<=100) score-=2; // day balanced → protect it
          if(dayTotals.protein>=tgt.protein)   score-=1;  // protein good → protect it
          candidates.push({d,m,score});
        }
      }
      // Sort highest score first; tie-break by later in week (higher d) to match old fallback
      candidates.sort((a,b)=>b.score-a.score||b.d-a.d);
      // Clear top `missing` candidates; fall back to original end-of-week if list is short
      let freed=0;
      for(const c of candidates){
        if(freed>=missing)break;
        S.plan[c.d]={...S.plan[c.d],[c.m]:null};
        freed++;
      }
      // Fallback: if scoring didn't free enough, sweep end-of-week for the remainder
      if(freed<missing){
        outer:for(let d=S.days-1;d>=0&&freed<missing;d--){
          for(const m of["dinner","lunch","breakfast"]){
            if(freed>=missing)break outer;
            if(d===dayIdx&&m===meal)continue;
            const slot=S.plan[d]?.[m];
            if(slot?.id&&slot.id!==id){S.plan[d]={...S.plan[d],[m]:null};freed++;}
          }
        }
      }
    }
  }
  changeServings(dayIdx,meal,sv);
  closeRecipe();
}

function changeServings(dayIdx,meal,newSv){
  backupPlan();
  const slot=S.plan[dayIdx]?.[meal];if(!slot?.id)return;
  const id=slot.id;const scale=slot.scale||1;
  const opp={breakfast:"breakfast",lunch:"dinner",dinner:"lunch"};
  // Clear all slots for this recipe
  for(let d=0;d<S.days;d++){
    if(d===dayIdx)continue;
    ["lunch","dinner"].forEach(m=>{if(S.plan[d][m]?.id===id){S.plan[d]={...S.plan[d],[m]:null};}});
  }
  // Write servings to anchor slot
  slot.servings=newSv;
  // Re-fill alternating forward then backward
  let portionsLeft=newSv-1;
  let nextMeal=opp[meal];
  for(let d=dayIdx+1;d<S.days&&portionsLeft>0;d++){
    if(!S.plan[d][nextMeal]&&!Object.values(S.plan[d]).some(s=>s?.id===id)){
      S.plan[d]={...S.plan[d],[nextMeal]:{id,scale,servings:newSv}};portionsLeft--;nextMeal=opp[nextMeal];
    }
  }
  nextMeal=opp[meal];
  for(let d=dayIdx-1;d>=0&&portionsLeft>0;d--){
    if(!S.plan[d][nextMeal]&&!Object.values(S.plan[d]).some(s=>s?.id===id)){
      S.plan[d]={...S.plan[d],[nextMeal]:{id,scale,servings:newSv}};portionsLeft--;nextMeal=opp[nextMeal];
    }
  }
  persistPlan();render();
}
function openGuestScale(id,dayIdx,meal){
  const slot=S.plan?.[dayIdx]?.[meal];
  S.guestScale={id,dayIdx:dayIdx??null,meal:meal??null,people:slot?.guests||""};
  renderModals();
}

// Pure assignment: sets exactly one slot, no side effects
function assignRecipeToSlot(dayIdx,meal,recipeId,servings){
  if(!S.plan[dayIdx])S.plan[dayIdx]={breakfast:null,lunch:null,dinner:null};
  const r=allRecipes().find(x=>x.id===recipeId);
  const target=(S.settings||DEFAULT_SETTINGS).calories||1700;
  const scale=r?calcDynamicScale(S.plan[dayIdx],meal,r.nutrition.calories,allRecipes(),target):1;
  S.plan[dayIdx]={...S.plan[dayIdx],[meal]:{id:recipeId,scale,servings:servings||1}};
}

// Optional propagation: fills other empty slots with the same recipe
function propagateRecipe(dayIdx,meal,recipeId,servings){
  const r=allRecipes().find(x=>x.id===recipeId);
  const target=(S.settings||DEFAULT_SETTINGS).calories||1700;
  const opp={breakfast:"breakfast",lunch:"dinner",dinner:"lunch"};
  let portionsLeft=(servings||1)-1;
  let nextMeal=opp[meal];
  for(let d=dayIdx+1;d<S.days&&portionsLeft>0;d++){
    if(!S.plan[d])S.plan[d]={breakfast:null,lunch:null,dinner:null};
    if(!S.plan[d][nextMeal]&&!Object.values(S.plan[d]).some(s=>s?.id===recipeId)){
      const scale=r?calcDynamicScale(S.plan[d],nextMeal,r.nutrition.calories,allRecipes(),target):1;
      S.plan[d]={...S.plan[d],[nextMeal]:{id:recipeId,scale,servings}};
      portionsLeft--;nextMeal=opp[nextMeal];
    }
  }
  nextMeal=opp[meal];
  for(let d=dayIdx-1;d>=0&&portionsLeft>0;d--){
    if(!S.plan[d])S.plan[d]={breakfast:null,lunch:null,dinner:null};
    if(!S.plan[d][nextMeal]&&!Object.values(S.plan[d]).some(s=>s?.id===recipeId)){
      const scale=r?calcDynamicScale(S.plan[d],nextMeal,r.nutrition.calories,allRecipes(),target):1;
      S.plan[d]={...S.plan[d],[nextMeal]:{id:recipeId,scale,servings}};
      portionsLeft--;nextMeal=opp[nextMeal];
    }
  }
}

function pickMeal(dayIdx,mealType,id,sv){
  backupPlan();
  const servings=parseInt(sv)||1;
  // Assign to the selected slot only — no hidden mutations
  assignRecipeToSlot(dayIdx,mealType,id,servings);
  // Propagate only if user explicitly set multiple servings (portionsLeft > 0)
  if(servings>1)propagateRecipe(dayIdx,mealType,id,servings);
  S.pickerModal=null;persistPlan();render();
}

function toggleWizardRecipe(type,id){
  const w=S.planState.wizard;
  const picker=S.planState.picker;
  if(type==="breakfast"){
    if(w.breakfastIds.includes(id))w.breakfastIds=w.breakfastIds.filter(x=>x!==id);
    else if(w.breakfastIds.length<(picker?.maxSelect||2))w.breakfastIds=[...w.breakfastIds,id];
  }else{
    if(w.dinnerIds.includes(id)){w.dinnerIds=w.dinnerIds.filter(x=>x!==id);delete w.dinnerServings[id];}
    else{w.dinnerIds=[...w.dinnerIds,id];if(!w.dinnerServings[id])w.dinnerServings[id]=2;S.planState.picker=null;}
  }
  renderModals();render();
}

function sendToAnyList(){
  const list=buildShoppingList(S.plan,allRecipes(),S.days);
  const allItems=Object.values(list).flat();
  if(!allItems.length){alert('No items in your shopping list yet!');return;}
  // Copy as plain text, one item per line (AnyList can import this via paste)
  const plain=allItems.map(i=>i.text).join('\n');
  if(navigator.clipboard){
    navigator.clipboard.writeText(plain).then(()=>{
      S.shoppingExportMsg='✓ List copied! In AnyList tap + → paste to import.';
      render();
      setTimeout(()=>{S.shoppingExportMsg='';render();},6000);
      // Open AnyList after a short delay
      setTimeout(()=>{window.location.href='anylist://';},400);
    }).catch(()=>{
      // Fallback if clipboard fails
      window.location.href='anylist://';
    });
  } else {
    window.location.href='anylist://';
  }
}

function confirmRollback(){
  const confirmed=confirm(
    "⚠️ Restore Previous Version\n\n"+
    "This will replace your current plan with the version from before your last change.\n\n"+
    "Your current plan will be saved as the 'next version' so you can redo this if needed.\n\n"+
    "Continue?"
  );
  if(!confirmed)return;
  undoLastChange();
}

// ── PLAN SCALE REBUILD ────────────────────────────────────────────────────────
function getTargetCalories(){
  return(S.settings||DEFAULT_SETTINGS).calories||1700;
}
function rebuildPlanWithNewTargets(){
  const recipes=allRecipes();
  const target=getTargetCalories();
  for(let d=0;d<S.days;d++){
    const day=S.plan[d]||{};
    ["breakfast","lunch","dinner"].forEach(meal=>{
      const slot=day[meal];
      if(!slot?.id)return;
      const recipe=recipes.find(r=>r.id===slot.id);
      if(!recipe)return;
      // Recompute scale against new target; other already-updated slots on same day
      // inform remaining-calorie split via calcDynamicScale
      slot.scale=calcDynamicScale(day,meal,recipe.nutrition.calories,recipes,target);
    });
  }
}

function applyCalculatedTargets(){
  const t=S._pendingTargets;
  if(t){
    S.settingsState.f={calories:t.calories,protein:t.protein,carbs:t.carbs,fat:t.fat,fiber:t.fiber};
    S.settingsState.tab="targets";
    S._pendingTargets=null;
    render();
  }
}
function saveSettings(){
  S.settings={...S.settingsState.f};
  S.profile={...S.settingsState.p};
  save("settings3",S.settings);
  save("profile3",S.profile);
  // Recompute all slot scales against the new calorie target
  rebuildPlanWithNewTargets();
  persistPlan();
  const btn=document.getElementById("save-settings-btn");
  if(btn){btn.textContent="✓ Saved!";btn.style.background="#16A34A";setTimeout(()=>{if(btn){btn.textContent="Save Settings";btn.style.background=G;}},2000);}
}

  S_recipeDraft={
    title:r.title,
    type:r.type,
    emoji:r.emoji||"🍽️",
    time:r.time||30,
    servings:r.servings||2,
    ingredients:(r.ingredients||[]).join("\n"),
    steps:(r.steps||[]).join("\n"),
    calories:r.nutrition?.calories||"",
    protein:r.nutrition?.protein||"",
    carbs:r.nutrition?.carbs||"",
    fat:r.nutrition?.fat||"",
    fiber:r.nutrition?.fiber||"",
    sodium:r.nutrition?.sodium||"",
    image:r.image||""
  };
  S_editingRecipeId=id;
  closeRecipe(); // close view modal before opening edit form
  S.addModal=true;
  renderModals();

function closeAddModal(){S.addModal=null;S_editingRecipeId=null;renderModals();}
function submitAddModal(){
  const f=S_recipeDraft;
  if(!f.title.trim()){alert("Recipe title is required.");return;}
  const updated={
    id:S_editingRecipeId||("u"+Date.now()),
    title:f.title.trim(),
    type:f.type,
    emoji:f.emoji||"🍽️",
    time:parseInt(f.time)||30,
    servings:parseInt(f.servings)||2,
    ingredients:f.ingredients.split("\n").map(s=>s.trim()).filter(Boolean),
    steps:f.steps.split("\n").map(s=>s.trim()).filter(Boolean),
    image:f.image||"",
    nutrition:{calories:parseInt(f.calories)||400,protein:parseInt(f.protein)||20,carbs:parseInt(f.carbs)||50,fat:parseInt(f.fat)||15,fiber:parseInt(f.fiber)||8,sodium:parseInt(f.sodium)||400}
  };
  if(S_editingRecipeId){
    const idx=S.userRecipes.findIndex(r=>r.id===S_editingRecipeId);
    if(idx!==-1)S.userRecipes[idx]=updated;
    else S.userRecipes=[...S.userRecipes,updated];
  }else{
    S.userRecipes=[...S.userRecipes,updated];
  }
  save("ur3",S.userRecipes);
  S.addModal=null;
  S_editingRecipeId=null;
  render();
}

// ── SOFT DELETE + UNDO TOAST ──────────────────────────────────────────────────
let S_lastDeleted=null;
let S_undoTimer=null;

function softDeleteRecipe(id){
  const recipe=S.userRecipes.find(r=>r.id===id);
  if(!recipe)return;
  recipe.deleted=true;          // in-place mutation — preserves reference for undo
  S_lastDeleted=recipe;
  save("ur3",S.userRecipes);
  closeRecipe();
  showUndoToast();
  render();
}

function undoDelete(){
  if(!S_lastDeleted)return;
  S_lastDeleted.deleted=false;  // same reference — no index lookup needed
  save("ur3",S.userRecipes);
  S_lastDeleted=null;
  clearTimeout(S_undoTimer);
  hideUndoToast();
  render();
}

function showUndoToast(){
  clearTimeout(S_undoTimer);
  const root=document.getElementById("toast-root");
  if(root){
    root.innerHTML=`<div style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;background:#2E3038;color:#FFF;border-radius:8px;padding:12px 20px;display:flex;align-items:center;gap:14px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,0.25);white-space:nowrap">
      <span>Recipe deleted</span>
      <button onclick="undoDelete()" style="background:#5AAAC8;color:#FFF;border:none;border-radius:5px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif">Undo</button>
    </div>`;
  }
  S_undoTimer=setTimeout(hideUndoToast,5000);
}

function hideUndoToast(){
  const root=document.getElementById("toast-root");
  if(root)root.innerHTML="";
  S_lastDeleted=null;
  clearTimeout(S_undoTimer);
}

function restoreRecipe(id){
  const idx=S.userRecipes.findIndex(r=>r.id===id);
  if(idx===-1)return;
  S.userRecipes[idx]={...S.userRecipes[idx],deleted:false};
  save("ur3",S.userRecipes);
  render();
}
function permanentlyDeleteRecipe(id){
  if(!confirm("Permanently delete this recipe? This cannot be undone."))return;
  S.userRecipes=S.userRecipes.filter(r=>r.id!==id);
  save("ur3",S.userRecipes);
  render();
}
function deleteUserRecipe(id){
  S.userRecipes=S.userRecipes.filter(r=>r.id!==id);
  S.plan=S.plan.map(d=>({breakfast:d.breakfast?.id===id?null:d.breakfast,lunch:d.lunch?.id===id?null:d.lunch,dinner:d.dinner?.id===id?null:d.dinner}));
  save("ur3",S.userRecipes);
  persistPlan();render();
}

// ── BACKUP MODAL ───────────────────────────────────────────────────────────────
function openBackup(){S.backupModal={mode:"export",importText:"",importError:""};renderModals();}
function closeBackup(){S.backupModal=null;renderModals();}

function renderBackupModal(){
  if(!S.backupModal)return"";
  const{mode,importText,importError}=S.backupModal;
  const exportText=JSON.stringify({plan:S.plan,settings:S.settings,userRecipes:S.userRecipes},null,2);
  let html=`<div class="modal-overlay center" onclick="if(event.target===this)closeBackup()">`;
  html+=`<div class="modal-sheet centered" style="max-width:500px">`;
  html+=`<div style="padding:16px 20px;border-bottom:1px solid #E8E3DA;flex-shrink:0">`;
  html+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-family:Georgia,serif;font-size:18px;font-weight:700">Backup & Restore</div><button onclick="closeBackup()" style="border:none;background:none;font-size:24px;cursor:pointer;color:var(--text-tertiary)">×</button></div>`;
  html+=`<div style="display:flex;gap:8px">`;
  ["export","import"].forEach(m=>{html+=`<button onclick="S.backupModal.mode='${m}';renderModals()" style="flex:1;padding:10px;border:2px solid ${mode===m?G:"#E0DAD0"};border-radius:10px;background:${mode===m?G+"15":"#FFF"};color:${mode===m?G:"#666"};font-size:14px;font-weight:${mode===m?700:400};cursor:pointer">${m==="export"?"📤 Backup":"📥 Restore"}</button>`;});
  html+=`</div></div>`;
  html+=`<div style="padding:20px;flex:1;overflow-y:auto">`;
  if(mode==="export"){
    html+=`<div style="font-size:14px;color:#666;margin-bottom:14px;line-height:1.6">Copy this text and save it somewhere safe — Notes app, email to yourself, anywhere. Paste it back in to restore your plan anytime.</div>`;
    html+=`<textarea readonly rows="10" class="inp" style="font-size:11px;font-family:monospace;line-height:1.4;resize:none;background:#F8F8F6;color:#555">${esc(exportText)}</textarea>`;
    html+=`<button onclick="navigator.clipboard&&navigator.clipboard.writeText(${JSON.stringify(exportText)}).then(()=>{const b=event.target;b.textContent='✓ Copied!';b.style.background='#16A34A';setTimeout(()=>{b.textContent='Copy backup text';b.style.background='${G}';},2000)})" style="width:100%;margin-top:12px;padding:14px;background:${G};color:#FFF;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer">Copy backup text</button>`;
  }else{
    html+=`<div style="font-size:14px;color:#666;margin-bottom:14px;line-height:1.6">Paste your previously copied backup text below to restore your plan, settings and recipes.</div>`;
    html+=`<textarea rows="10" class="inp" style="font-size:11px;font-family:monospace;line-height:1.4;resize:none" placeholder="Paste your backup text here..." oninput="S.backupModal.importText=this.value;S.backupModal.importError='';renderModals()">${esc(importText)}</textarea>`;
    if(importError)html+=`<div style="margin-top:8px;font-size:13px;color:#DC2626;font-weight:600">${esc(importError)}</div>`;
    html+=`<button onclick="doImport()" ${!importText.trim()?"disabled":""} style="width:100%;margin-top:12px;padding:14px;background:${importText.trim()?G:"#E8E3DA"};color:${importText.trim()?"#FFF":"#AAA"};border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:${importText.trim()?"pointer":"default"}">Restore from backup</button>`;
  }
  html+=`</div></div></div>`;
  return html;
}

function doImport(){
  try{
    const d=JSON.parse(S.backupModal.importText);
    if(!d||typeof d!=="object"||!d.plan)throw new Error("Invalid backup");
    S.plan=d.plan||S.plan;
    if(d.settings){S.settings=d.settings;save("settings3",d.settings);}
    if(d.userRecipes){S.userRecipes=d.userRecipes;save("ur3",d.userRecipes);}
    persistPlan();
    S.backupModal=null;
    S.saveStatus="✓ Restored!";
    setTimeout(()=>{S.saveStatus="";render();},3000);
    render();
  }catch(e){S.backupModal.importError="Invalid backup text. Please check and try again.";renderModals();}
}

// ── MODALS RENDERER ───────────────────────────────────────────────────────────
function renderModals(){
  const root=document.getElementById("modal-root");
  let html="";
  if(S.recipeModal)html+=renderRecipeModal();
  if(S.pickerModal)html+=renderPickerModal();
  if(S.planState.picker)html+=renderWizardPicker();
  // NOTE: addModal is intentionally excluded — it uses add-modal-root to avoid DOM reconstruction
  if(S.backupModal)html+=renderBackupModal();
  if(S.guestScale)html+=renderGuestScaleModal();
  const prevActive=document.activeElement;
  const prevSelStart=prevActive?.selectionStart;
  const prevSelEnd=prevActive?.selectionEnd;
  const prevId=prevActive?.dataset?.focusId;
  root.innerHTML=html;
  // Restore focus to search input if it was active
  if(prevId){const el=root.querySelector(`[data-focus-id="${prevId}"]`);if(el){el.focus();try{el.setSelectionRange(prevSelStart,prevSelEnd);}catch(e){}}}
  // Prevent body scroll when any modal is open
  document.body.style.overflow=(html||S.addModal)?"hidden":"auto";
  // Add modal: mount only once per open using stable flag — never tear down while open
  const addRoot=document.getElementById("add-modal-root");
  if(S.addModal&&!S_addModalMounted){addRoot.innerHTML=renderAddModal();S_addModalMounted=true;}
  if(!S.addModal&&S_addModalMounted){addRoot.innerHTML="";S_addModalMounted=false;}}

    h+="<img class='r-img' src='"+imgSrc+"' alt='"+r.title+"' onerror=\"this.style.display='none'\">";
    h+="<div class='ing-title'>"+(pdfFactor!==1?"Ingredients for "+totalServings+" serving"+(totalServings!==1?"s":""):"Ingredients")+"</div>";
    r.ingredients.forEach(ing=>{h+="<div class='ing'><div class='dot'></div>"+(pdfFactor!==1?scaleIng(ing,pdfFactor):ing)+"</div>";});
    h+="</div><div><div class='meth-title'>Method</div>";
    r.steps.forEach((step,i)=>{h+="<div class='step'><div class='snum'>"+(i+1)+"</div><div class='stxt'>"+step+"</div></div>";});
    h+="</div></div>";
    if(r.nutrition){
      h+="<div style='text-align:left;font-size:11px;color:#9A9098;font-weight:400;margin-top:8px;margin-bottom:4px'>Nutrition values shown per serving</div>";
      h+="<div class='nutr'>";
      h+="<div class='nc'><div class='nv' style='color:#F0A500'>"+Math.round(r.nutrition.calories*nutritionScale)+"</div><div class='nl'>Cal</div></div>";
      h+="<div class='nc'><div class='nv' style='color:#5AAAC8'>"+Math.round(r.nutrition.protein*nutritionScale)+"g</div><div class='nl'>Protein</div></div>";
      h+="<div class='nc'><div class='nv' style='color:#2E3038'>"+Math.round(r.nutrition.carbs*nutritionScale)+"g</div><div class='nl'>Carbs</div></div>";
      h+="<div class='nc'><div class='nv' style='color:#F0C4BC'>"+Math.round(r.nutrition.fat*nutritionScale)+"g</div><div class='nl'>Fat</div></div>";
      h+="<div class='nc'><div class='nv' style='color:#C8A0D8'>"+Math.round((r.nutrition.fiber||0)*nutritionScale)+"g</div><div class='nl'>Fibre</div></div>";
      h+="</div>";
    }
    h+="<div class='footer'>DIMPLE'S KITCHEN &nbsp;&middot;&nbsp; "+new Date().toLocaleDateString("en-AU",{year:"numeric",month:"long",day:"numeric"})+"</div>";
    h+="</div>";
  });
  const shoppingList=buildShoppingList(S.plan,all,S.days);
  const hasItems=Object.values(shoppingList).some(items=>items.length>0);
  if(hasItems){
    h+="<div class='page'>";
    h+="<div style='padding-bottom:14px;border-bottom:2px solid #2E3038;margin-bottom:24px'><div style='font-size:22px;font-weight:800;color:#2E3038'>Shopping List</div><div style='font-size:13px;color:#9A9098;margin-top:5px'>"+new Date().toLocaleDateString("en-AU",{year:"numeric",month:"long",day:"numeric"})+"</div></div>";
    Object.entries(shoppingList).sort().forEach(([cat,items])=>{
      if(!items.length)return;
      h+="<div style='font-size:12px;font-weight:700;color:#2E3038;margin:18px 0 8px;text-transform:uppercase;letter-spacing:0.8px'>"+cat+" ("+items.length+")</div>";
      h+="<div style='border:1px solid #E8E0D8;border-radius:4px;overflow:hidden;margin-bottom:4px'>";
      items.forEach(item=>{
        const badge=item.combined?"<span style='font-size:10px;background:#FFF5E0;color:#C87800;border:1px solid #F0D090;border-radius:3px;padding:1px 6px;font-weight:700;margin-left:6px'>x"+item.count+" recipes</span>":"";
        h+="<div style='display:flex;align-items:flex-start;gap:12px;padding:9px 14px;border-bottom:1px solid #F0EBE6'>";
        h+="<div style='width:16px;height:16px;min-width:16px;border:2px solid #C0C0B8;border-radius:3px;margin-top:2px'></div>";
        h+="<div><div style='font-size:13px;color:#2E3038;font-weight:600'>"+item.text+badge+"</div>";
        h+="<div style='font-size:11px;color:#B0A8B0;margin-top:2px'>from: "+item.from+"</div></div></div>";
      });
      h+="</div>";
    });
    h+="<div class='footer'>DIMPLE'S KITCHEN &nbsp;&middot;&nbsp; "+new Date().toLocaleDateString("en-AU",{year:"numeric",month:"long",day:"numeric"})+"</div></div>";
  }
  h+="</body></html>";
  const blob=new Blob([h],{type:"text/html;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const newTab=window.open(url,"_blank");
  if(!newTab){const w=window.open("","_blank");if(w){w.document.write(h);w.document.close();}else{alert("Please allow popups.");}}
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}
// ── INIT ──────────────────────────────────────────────────────────────────────
(function init(){
  const ur=load("ur3",[]);
  const pl=load("plan3",DEFAULT_PLAN);
  const settings=load("settings3",DEFAULT_SETTINGS);
  const days=load("days3",7);
  const chk=load("checked3",{});
  const favs=load("favs3",[]);
  const profile=load("profile3",DEFAULT_PROFILE);
  const sv=load("sv3",{});
  const gs=load("gs3",{});
  const extras=load("extras3",{});
  S.userRecipes=ur;
  S.plan=Array.isArray(pl)&&pl.length===7?pl:DEFAULT_PLAN.map(EMPTY_DAY);
  S.settings=settings;
  S.settingsState.f={...settings};
  S.settingsState.p={...profile};
  S.days=days;
  S.checked=chk;
  S.favorites=new Set(Array.isArray(favs)?favs:[]);
  S.profile=profile;
  S.servings=sv;
  S.guestServings=gs;
  S.extras=extras;
  render();
})();
</script>
</body>
